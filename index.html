
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Квиз</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        rel="stylesheet"
        href="css/start.css"
    >
</head>
<body class="dark-theme">
    <div class="start-page">
        <div class="left-start-page">
        <h1 class="title-start">
            КИБЕРКВЕСТ <br><span class="inner-title-start">«СПАСИ АККАУНТ»</span>
        </h1>
        <p>
            Сегодня злоумышленники пытаются украсть аккаунты учеников школы.
            Твоя задача — пройти все испытания и сохранить данные. <br><br>
            <span style="font-weight: 900;">Правила:</span><br>
            Читай ситуацию.<br>
            Выбирай один ответ.<br>
            Переходи по ссылке.<br>
            Ошибся → вернись и попробуй снова.

        </p>
        </div>

        <div class="right-start-page">
            <p class="subtitle">
            Введи имя и фамилию перед началом
        </p>
        <form class="start-form">
            <input id="name" type="text" placeholder="Имя" required > 
            <input id="surname" type="text" placeholder="Фамилия" required >
            <button
                type="submit"
                class="start-btn"
            >
                Начать
            </button>
        </form>
        </div>
    </div>
    <script src="js/start.js"></script>
</body>
</html>
